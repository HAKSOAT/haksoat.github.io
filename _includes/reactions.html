{% if jekyll.environment == 'production' %}
{% comment %}
  Reactions widget — powered by Vercel + Upstash Redis
  Anonymous, no login required.
  Reactions: like (👍), love (❤️), insightful (💡), curious (🤔)
{% endcomment %}

<div class="post-reactions" id="post-reactions">
  <p class="reactions__label">How did this post make you feel?</p>
  <div class="reactions__buttons">
    <button class="reaction-btn" data-reaction="like"       aria-label="Like">        👍 <span class="reaction-count" id="count-like">…</span></button>
    <button class="reaction-btn" data-reaction="love"       aria-label="Love">        ❤️ <span class="reaction-count" id="count-love">…</span></button>
    <button class="reaction-btn" data-reaction="insightful" aria-label="Insightful">  💡 <span class="reaction-count" id="count-insightful">…</span></button>
    <button class="reaction-btn" data-reaction="curious"    aria-label="Curious">     🤔 <span class="reaction-count" id="count-curious">…</span></button>
  </div>
  <p class="reactions__note" id="reactions-note"></p>
</div>

<style>
  .post-reactions {
    margin: 2rem 0 1rem;
    padding: 0.5rem 0;
    text-align: center;
  }
  .reactions__label {
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 0.75rem;
    font-weight: 500;
  }
  .reactions__buttons {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .reaction-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 1rem;
    border: 1px solid #ddd;
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    color: #333;
  }
  .reaction-btn:hover {
    background: #f0f0f0;
    border-color: #aaa;
  }
  .reaction-btn.reacted {
    background: #e8f4fd;
    border-color: #4a90d9;
    color: #1a6bb5;
    font-weight: 600;
  }
  .reaction-btn:active {
    transform: scale(0.95);
  }
  .reaction-count {
    font-size: 0.85rem;
    font-weight: 600;
    min-width: 1.2em;
    display: inline-block;
  }
  .reactions__note {
    font-size: 0.78rem;
    color: #888;
    margin-top: 0.6rem;
    min-height: 1em;
  }
</style>

<script>
(function () {
  // Derive the slug from the current page pathname (matches Giscus discussion_term: pathname)
  var slug = window.location.pathname.replace(/^\//, '');
  // Ensure trailing slash is present to match Giscus convention
  if (slug && slug.slice(-1) !== '/') slug += '/';

  var API_BASE = 'https://haksoat-reactions-api.vercel.app/api/reactions';
  var STORAGE_KEY = 'reacted:' + slug;

  var reacted = localStorage.getItem(STORAGE_KEY);

  function updateCounts(counts) {
    ['like', 'love', 'insightful', 'curious'].forEach(function (r) {
      var el = document.getElementById('count-' + r);
      if (el) el.textContent = counts[r] || 0;
    });
  }

  function markReacted(reaction) {
    var btns = document.querySelectorAll('.reaction-btn');
    btns.forEach(function (btn) {
      btn.disabled = true;
      if (btn.dataset.reaction === reaction) {
        btn.classList.add('reacted');
      }
    });
    document.getElementById('reactions-note').textContent = 'Thanks for your reaction!';
  }

  // Load current counts
  fetch(API_BASE + '?slug=' + encodeURIComponent(slug))
    .then(function (r) { return r.json(); })
    .then(function (counts) {
      updateCounts(counts);
      if (reacted) markReacted(reacted);
    })
    .catch(function () {
      ['like', 'love', 'insightful', 'curious'].forEach(function (r) {
        var el = document.getElementById('count-' + r);
        if (el) el.textContent = '–';
      });
    });

  // Handle button clicks
  document.querySelectorAll('.reaction-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      if (reacted) return;
      var reaction = btn.dataset.reaction;

      fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: slug, reaction: reaction }),
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var countEl = document.getElementById('count-' + reaction);
          if (countEl) countEl.textContent = data.count;
          reacted = reaction;
          localStorage.setItem(STORAGE_KEY, reaction);
          markReacted(reaction);
        })
        .catch(function () {
          document.getElementById('reactions-note').textContent = 'Could not save reaction. Please try again.';
        });
    });
  });
})();
</script>
{% endif %}
